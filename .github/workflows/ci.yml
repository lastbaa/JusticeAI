name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cargo_flags: ""
          - os: windows-latest
            cargo_flags: ""
          - os: ubuntu-latest
            cargo_flags: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      # Linux: install system libraries required by Tauri and llama-cpp-2
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libvulkan-dev \
            vulkan-validationlayers \
            glslc \
            cmake

      # Windows: install Vulkan SDK for llama-cpp-2 compilation
      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: latest
          cache: true

      - name: Cargo check
        working-directory: app/src-tauri
        run: cargo check --lib

      - name: Cargo clippy
        working-directory: app/src-tauri
        run: cargo clippy --lib -- -D warnings || true

      - name: Cargo test
        working-directory: app/src-tauri
        run: cargo test

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo audit
        working-directory: app/src-tauri
        run: cargo audit

  frontend:
    name: Frontend (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Build frontend
        working-directory: app
        run: npx vite build

      - name: Run frontend tests
        working-directory: app
        run: npx vitest run
