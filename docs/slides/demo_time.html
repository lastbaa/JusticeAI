<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
  }
  .slide {
    width: 1280px;
    height: 720px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #0d1117;
    overflow: hidden;
  }

  /* Subtle radial glow behind logo */
  .glow {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, rgba(201,168,76,0.02) 40%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    pointer-events: none;
  }

  /* Thin gold ring */
  .ring {
    position: absolute;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.08);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -58%);
    pointer-events: none;
  }
  .ring2 {
    width: 380px;
    height: 380px;
    border-color: rgba(201,168,76,0.04);
    transform: translate(-50%, -55%);
  }

  /* Scales of justice logo */
  .logo {
    margin-bottom: 40px;
    position: relative;
    z-index: 2;
    opacity: 0.85;
  }

  /* Main text */
  .demo-text {
    font-size: 72px;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: white;
    position: relative;
    z-index: 2;
    margin-bottom: 12px;
  }
  .demo-text em {
    font-style: normal;
    color: #c9a84c;
    font-weight: 400;
  }

  /* Subtle underline accent */
  .accent-line {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5), transparent);
    margin-bottom: 32px;
    position: relative;
    z-index: 2;
  }

  /* Subtitle */
  .subtitle {
    font-size: 15px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.4);
    font-weight: 500;
    position: relative;
    z-index: 2;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 36px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }
  .bottom-text {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
    font-weight: 500;
  }
  .bottom-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(201,168,76,0.25);
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 32px;
    height: 32px;
    border-color: rgba(201,168,76,0.1);
    border-style: solid;
  }
  .corner-tl { top: 32px; left: 32px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 32px; right: 32px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 32px; left: 32px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 32px; right: 32px; border-width: 0 1px 1px 0; }
</style>
</head>
<body>
  <div class="slide">
    <!-- Decorative elements -->
    <div class="glow"></div>
    <div class="ring"></div>
    <div class="ring ring2"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Scales of justice logo -->
    <svg class="logo" width="72" height="72" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="4" r="1.8" fill="#c9a84c"/>
      <rect x="13" y="4" width="2" height="17" rx="1" fill="#c9a84c"/>
      <rect x="8" y="21" width="12" height="2" rx="1" fill="#c9a84c"/>
      <rect x="11" y="23" width="6" height="1.5" rx="0.75" fill="rgba(201,168,76,0.6)"/>
      <rect x="4" y="7.5" width="20" height="2" rx="1" fill="#c9a84c"/>
      <line x1="6.5" y1="9.5" x2="4.5" y2="17" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="21.5" y1="9.5" x2="23.5" y2="17" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M2 17 Q4.5 20.5 7 17" stroke="#c9a84c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M21 17 Q23.5 20.5 26 17" stroke="#c9a84c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>

    <!-- Main title -->
    <div class="demo-text"><em>Demo</em> Time</div>

    <!-- Accent -->
    <div class="accent-line"></div>

    <!-- Subtitle -->
    <div class="subtitle">Justice AI v2.0.0</div>

    <!-- Bottom -->
    <div class="bottom-bar">
      <span class="bottom-text">Private</span>
      <div class="bottom-dot"></div>
      <span class="bottom-text">Local</span>
      <div class="bottom-dot"></div>
      <span class="bottom-text">Cited</span>
    </div>
  </div>
</body>
</html>
